<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 20px;
            border-bottom: 2px solid #28a745;
            margin-bottom: 30px;
        }
        .category-section {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #28a745;
        }
        .product-item {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #444;
        }
        .product-info {
            flex: 1;
        }
        .product-title {
            font-weight: bold;
            color: #28a745;
            margin-bottom: 5px;
        }
        .product-details {
            font-size: 0.9em;
            color: #aaa;
        }
        .product-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .status-btn {
            min-width: 100px;
            cursor: pointer;
        }
        .btn-success { background: #28a745 !important; }
        .btn-danger { background: #dc3545 !important; }
        .btn-warning { background: #ffc107 !important; color: #000 !important; }
        .btn-primary { background: #0d6efd !important; }
        .add-product-form {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #444;
            display: none;
        }
        .add-product-form.show {
            display: block;
        }
        .form-control, .form-select {
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
        }
        .form-control:focus, .form-select:focus {
            background: #1a1a1a;
            border-color: #28a745;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.25);
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #2d2d2d;
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #444;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #28a745;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-boxes"></i> Product Manager</h1>
        <p class="mb-0">Manage all products across all categories</p>
    </div>

    <div class="container-fluid">
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCategories">0</div>
                        <div>Categories</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalProducts">0</div>
                        <div>Total Products</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number text-success" id="availableProducts">0</div>
                        <div>Available</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number text-danger" id="soldProducts">0</div>
                        <div>Sold</div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="category-section">
                    <h5><i class="fas fa-plus-circle"></i> Create New Category</h5>
                    <form onsubmit="createCategory(event)" class="d-flex gap-2 mt-3">
                        <input type="text" class="form-control" name="categoryName" placeholder="e.g., Revolut, N26, etc." required>
                        <button type="submit" class="btn btn-success" style="white-space: nowrap;">
                            <i class="fas fa-plus"></i> Create
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin fa-3x"></i>
            <p>Loading products...</p>
        </div>

        <div id="categories"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';
        let categoriesData = [];

        async function loadCategories() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                categoriesData = await response.json();
                renderCategories();
                updateStats();
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                Swal.fire('Error', 'Failed to load categories. Make sure the server is running.', 'error');
            }
        }

        function updateStats() {
            let totalProducts = 0;
            let available = 0;
            let sold = 0;

            categoriesData.forEach(cat => {
                totalProducts += cat.products.length;
                cat.products.forEach(p => {
                    if (p.status === 'Available') available++;
                    else if (p.status === 'Sold') sold++;
                });
            });

            document.getElementById('totalCategories').textContent = categoriesData.length;
            document.getElementById('totalProducts').textContent = totalProducts;
            document.getElementById('availableProducts').textContent = available;
            document.getElementById('soldProducts').textContent = sold;
        }

        function renderCategories() {
            const container = document.getElementById('categories');
            container.innerHTML = '';

            categoriesData.forEach(category => {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `
                    <div class="category-header">
                        <h3><i class="fas fa-folder"></i> ${category.category} (${category.products.length})</h3>
                        <button class="btn btn-primary" onclick="showAddProduct('${category.filename}')">
                            <i class="fas fa-plus"></i> Add Product
                        </button>
                    </div>
                    <div class="add-product-form" id="form-${category.filename.replace('.html', '')}">
                        <h5>Add New Product to ${category.category}</h5>
                        <form onsubmit="addProduct(event, '${category.filename}')">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Title</label>
                                    <input type="text" class="form-control" name="title" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Price</label>
                                    <input type="text" class="form-control" name="price" value="$0.00" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" name="description" rows="2" required></textarea>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Balance</label>
                                    <input type="text" class="form-control" name="balance" value="Bal: $0.00" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Image</label>
                                    <input type="text" class="form-control" name="image" value="btc.jpg">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Status</label>
                                    <select class="form-select" name="status">
                                        <option value="Available">Available</option>
                                        <option value="Sold">Sold</option>
                                        <option value="Pending">Pending</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success">Save Product</button>
                            <button type="button" class="btn btn-secondary" onclick="hideAddProduct('${category.filename}')">Cancel</button>
                        </form>
                    </div>
                    <div id="products-${category.filename.replace('.html', '')}">
                        ${category.products.map((product, index) => renderProduct(category.filename, product, index)).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function renderProduct(filename, product, index) {
            const statusClass = product.status === 'Available' ? 'btn-success' : 
                               product.status === 'Sold' ? 'btn-danger' : 'btn-warning';
            return `
                <div class="product-item">
                    <div class="product-info">
                        <div class="product-title">${product.title}</div>
                        <div class="product-details">
                            ${product.price} | ${product.balance} | ${product.description.substring(0, 60)}...
                        </div>
                    </div>
                    <div class="product-actions">
                        <button class="btn ${statusClass} status-btn" onclick="changeStatus('${filename}', ${index}, '${product.status}')">
                            ${product.status}
                        </button>
                        <button class="btn btn-danger" onclick="deleteProduct('${filename}', ${index})" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        async function changeStatus(filename, productIndex, currentStatus) {
            const statuses = ['Available', 'Sold', 'Pending'];
            const currentIndex = statuses.indexOf(currentStatus);
            const newStatus = statuses[(currentIndex + 1) % statuses.length];

            try {
                const response = await fetch(`${API_URL}/update-status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename, productIndex, status: newStatus })
                });

                if (response.ok) {
                    await loadCategories();
                    Swal.fire({
                        icon: 'success',
                        title: 'Updated!',
                        text: `Status changed to ${newStatus}`,
                        timer: 1500,
                        showConfirmButton: false
                    });
                }
            } catch (error) {
                Swal.fire('Error', 'Failed to update status', 'error');
            }
        }

        function showAddProduct(filename) {
            const formId = 'form-' + filename.replace('.html', '');
            document.getElementById(formId).classList.add('show');
        }

        function hideAddProduct(filename) {
            const formId = 'form-' + filename.replace('.html', '');
            document.getElementById(formId).classList.remove('show');
        }

        async function addProduct(event, filename) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            const product = {
                title: formData.get('title'),
                description: formData.get('description'),
                price: formData.get('price'),
                balance: formData.get('balance'),
                image: formData.get('image'),
                status: formData.get('status')
            };

            try {
                const response = await fetch(`${API_URL}/add-product`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename, product })
                });

                if (response.ok) {
                    form.reset();
                    hideAddProduct(filename);
                    await loadCategories();
                    Swal.fire('Success!', 'Product added successfully', 'success');
                }
            } catch (error) {
                Swal.fire('Error', 'Failed to add product', 'error');
            }
        }

        async function deleteProduct(filename, productIndex) {
            const result = await Swal.fire({
                title: 'Delete Product?',
                text: 'This will permanently remove the product from the HTML file',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                confirmButtonText: 'Yes, delete it'
            });

            if (result.isConfirmed) {
                try {
                    const response = await fetch(`${API_URL}/delete-product`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename, productIndex })
                    });

                    if (response.ok) {
                        await loadCategories();
                        Swal.fire('Deleted!', 'Product has been removed', 'success');
                    }
                } catch (error) {
                    Swal.fire('Error', 'Failed to delete product', 'error');
                }
            }
        }

        async function createCategory(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const categoryName = formData.get('categoryName');

            try {
                const response = await fetch(`${API_URL}/create-category`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ categoryName })
                });

                const result = await response.json();

                if (response.ok) {
                    form.reset();
                    await loadCategories();
                    Swal.fire({
                        icon: 'success',
                        title: 'Category Created!',
                        html: `New category <strong>${categoryName}</strong> has been created.<br>File: ${result.filename}`,
                        confirmButtonText: 'Add Products Now'
                    });
                } else {
                    Swal.fire('Error', result.error, 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Failed to create category', 'error');
            }
        }

        // Load on page load
        loadCategories();
    </script>
</body>
</html>
