<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Product Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 50px;
        }
        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 20px;
            border-bottom: 2px solid #28a745;
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-section {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #28a745;
        }
        .product-item {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #444;
        }
        .product-info {
            flex: 1;
        }
        .product-title {
            font-weight: bold;
            color: #28a745;
            margin-bottom: 5px;
        }
        .product-details {
            font-size: 0.9em;
            color: #aaa;
        }
        .product-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .status-btn {
            min-width: 100px;
            cursor: pointer;
        }
        .btn-success { background: #28a745 !important; }
        .btn-danger { background: #dc3545 !important; }
        .btn-warning { background: #ffc107 !important; color: #000 !important; }
        .btn-primary { background: #0d6efd !important; }
        .add-product-form {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #444;
            display: none;
        }
        .add-product-form.show {
            display: block;
        }
        .form-control, .form-select {
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
        }
        .form-control:focus, .form-select:focus {
            background: #1a1a1a;
            border-color: #28a745;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.25);
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #2d2d2d;
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #444;
            flex: 1;
            min-width: 150px;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #28a745;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #28a745;
        }
        .logout-btn {
            background: #dc3545;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1><i class="fas fa-boxes"></i> Product Manager</h1>
            <p class="mb-0" style="color: #aaa;">Web-Based Admin Panel</p>
        </div>
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>

    <div class="container-fluid">
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCategories">0</div>
                        <div>Categories</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalProducts">0</div>
                        <div>Total Products</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number text-success" id="availableProducts">0</div>
                        <div>Available</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number text-danger" id="soldProducts">0</div>
                        <div>Sold</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="category-section">
                    <h5><i class="fas fa-plus-circle"></i> Create Category</h5>
                    <form onsubmit="createCategory(event)" class="d-flex gap-2 mt-3">
                        <input type="text" class="form-control" id="newCategoryName" placeholder="Category Name" required>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-plus"></i> Create
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin fa-3x"></i>
            <p>Loading products...</p>
        </div>

        <div id="categories"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/admin-products.js"></script>
    <script>
        // Check simple authentication
        if (localStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminEmail');
            window.location.href = 'admin-login.html';
        }
    </script>
</body>
</html>
