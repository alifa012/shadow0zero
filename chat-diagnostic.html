<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Diagnostic Tool</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #0f0;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1, h2 {
            border-bottom: 2px solid #0f0;
            padding-bottom: 0.5rem;
        }
        .section {
            background: #000;
            border: 1px solid #0f0;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 5px;
        }
        .error {
            color: #f00;
        }
        .success {
            color: #0f0;
        }
        .warning {
            color: #ff0;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        button:hover {
            background: #0c0;
        }
        pre {
            background: #111;
            padding: 1rem;
            overflow-x: auto;
            border-left: 3px solid #0f0;
        }
    </style>
</head>
<body>
    <h1>🔍 Chat System Diagnostic Tool</h1>
    
    <div class="section">
        <h2>1. Firebase Configuration</h2>
        <div id="config-status">Checking...</div>
    </div>

    <div class="section">
        <h2>2. Authentication Status</h2>
        <div id="auth-status">Checking...</div>
    </div>

    <div class="section">
        <h2>3. Conversations in Database</h2>
        <button onclick="loadConversations()">Refresh Conversations</button>
        <div id="conversations-data">Click button to load</div>
    </div>

    <div class="section">
        <h2>4. Messages in Database</h2>
        <button onclick="loadMessages()">Refresh Messages</button>
        <div id="messages-data">Click button to load</div>
    </div>

    <div class="section">
        <h2>5. Test Actions</h2>
        <button onclick="testSendMessage()">Send Test Message</button>
        <button onclick="clearAllData()">⚠️ Clear All Chat Data</button>
        <div id="test-results"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js';
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, serverTimestamp, query, orderBy, setDoc } from 'https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js';

        const firebaseConfig = {
          apiKey: "AIzaSyDYon3KKPHbZ-CO4CDsWiU02AYHocXqb1s",
          authDomain: "shadowlogsshop.firebaseapp.com",
          projectId: "shadowlogsshop",
          storageBucket: "shadowlogsshop.firebasestorage.app",
          messagingSenderId: "568187276796",
          appId: "1:568187276796:web:cb900b5d70c83b0bef9ce5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;

        // Store in window for button access
        window.db = db;
        window.auth = auth;

        // Check config
        document.getElementById('config-status').innerHTML = `
            <div class="success">✅ Firebase initialized successfully</div>
            <pre>${JSON.stringify(firebaseConfig, null, 2)}</pre>
        `;

        // Check auth
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-status').innerHTML = `
                    <div class="success">✅ User authenticated</div>
                    <pre>Email: ${user.email}\nUID: ${user.uid}\nProvider: ${user.providerData[0]?.providerId || 'N/A'}</pre>
                `;
            } else {
                document.getElementById('auth-status').innerHTML = `
                    <div class="error">❌ Not authenticated</div>
                    <p>You need to <a href="/login.html" style="color: #0ff;">login</a> first</p>
                `;
            }
        });

        window.loadConversations = async function() {
            const container = document.getElementById('conversations-data');
            container.innerHTML = '<div class="warning">⏳ Loading conversations...</div>';
            
            try {
                const q = query(collection(db, 'conversations'), orderBy('lastMessageAt', 'desc'));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    container.innerHTML = '<div class="warning">⚠️ No conversations found in database</div>';
                    return;
                }
                
                let html = `<div class="success">✅ Found ${snapshot.size} conversation(s)</div><pre>`;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    html += `\n--- Conversation ID: ${doc.id} ---\n`;
                    html += `User ID: ${data.userId}\n`;
                    html += `User Email: ${data.userEmail}\n`;
                    html += `Status: ${data.status}\n`;
                    html += `Last Message: ${data.lastMessageAt ? new Date(data.lastMessageAt.toDate()).toLocaleString() : 'N/A'}\n`;
                });
                html += '</pre>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div class="error">❌ Error loading conversations: ${error.message}</div><pre>${error.stack}</pre>`;
            }
        };

        window.loadMessages = async function() {
            const container = document.getElementById('messages-data');
            container.innerHTML = '<div class="warning">⏳ Loading messages...</div>';
            
            try {
                const snapshot = await getDocs(collection(db, 'messages'));
                
                if (snapshot.empty) {
                    container.innerHTML = '<div class="warning">⚠️ No messages found in database</div>';
                    return;
                }
                
                let html = `<div class="success">✅ Found ${snapshot.size} message(s)</div><pre>`;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    html += `\n--- Message ID: ${doc.id} ---\n`;
                    html += `Conversation: ${data.conversationId}\n`;
                    html += `Sender Type: ${data.senderType}\n`;
                    html += `Sender ID: ${data.senderId}\n`;
                    html += `Type: ${data.messageType}\n`;
                    html += `Content: ${data.content}\n`;
                    html += `Timestamp: ${data.timestamp ? new Date(data.timestamp).toLocaleString() : 'N/A'}\n`;
                });
                html += '</pre>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div class="error">❌ Error loading messages: ${error.message}</div><pre>${error.stack}</pre>`;
            }
        };

        window.testSendMessage = async function() {
            const container = document.getElementById('test-results');
            
            if (!currentUser) {
                container.innerHTML = '<div class="error">❌ You must be logged in to send a test message</div>';
                return;
            }
            
            container.innerHTML = '<div class="warning">⏳ Sending test message...</div>';
            
            try {
                const conversationId = currentUser.uid;
                
                // Create conversation
                const convRef = doc(db, 'conversations', conversationId);
                await setDoc(convRef, {
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    lastMessageAt: serverTimestamp(),
                    status: 'open'
                }, { merge: true });
                
                // Send message
                await addDoc(collection(db, 'messages'), {
                    conversationId: conversationId,
                    senderType: 'user',
                    senderId: currentUser.uid,
                    messageType: 'text',
                    content: 'Test message sent at ' + new Date().toLocaleString(),
                    timestamp: Date.now(),
                    createdAt: serverTimestamp()
                });
                
                container.innerHTML = '<div class="success">✅ Test message sent successfully!</div>';
                
                // Auto-refresh
                setTimeout(() => {
                    loadConversations();
                    loadMessages();
                }, 500);
            } catch (error) {
                container.innerHTML = `<div class="error">❌ Error sending test message: ${error.message}</div><pre>${error.stack}</pre>`;
            }
        };

        window.clearAllData = async function() {
            if (!confirm('⚠️ WARNING: This will delete ALL conversations and messages. Are you sure?')) {
                return;
            }
            
            const container = document.getElementById('test-results');
            container.innerHTML = '<div class="warning">⏳ Deleting all data...</div>';
            
            try {
                // Delete all messages
                const messagesSnapshot = await getDocs(collection(db, 'messages'));
                for (const docSnap of messagesSnapshot.docs) {
                    await deleteDoc(doc(db, 'messages', docSnap.id));
                }
                
                // Delete all conversations
                const convsSnapshot = await getDocs(collection(db, 'conversations'));
                for (const docSnap of convsSnapshot.docs) {
                    await deleteDoc(doc(db, 'conversations', docSnap.id));
                }
                
                container.innerHTML = `<div class="success">✅ Deleted ${messagesSnapshot.size} messages and ${convsSnapshot.size} conversations</div>`;
                
                // Auto-refresh
                setTimeout(() => {
                    loadConversations();
                    loadMessages();
                }, 500);
            } catch (error) {
                container.innerHTML = `<div class="error">❌ Error clearing data: ${error.message}</div><pre>${error.stack}</pre>`;
            }
        };
    </script>
</body>
</html>
