<script>
    function openEmailModal(productId, productTitle) {
        const modal = new tingle.modal({
            closeMethods: ['overlay', 'escape'],
            closeLabel: "Close",
            cssClass: ['custom-modal-class'],
            onClose: function() {
                console.log('modal closed');
            }
        });

        modal.setContent(`
            <div style="padding: 20px; text-align: center;">
                <div style="margin-bottom: 20px;">
                    <i class="fas fa-envelope" style="font-size: 3rem; color: #00ffff;"></i>
                </div>
                <h2 style="color: #00ffff; margin-bottom: 15px;">Enter Your Email</h2>
                <p style="color: #aaa; margin-bottom: 20px;">${productTitle}</p>
                <input type="email" id="emailInput" class="tingle-email" placeholder="your@email.com" required />
                <div class="modal-buttons">
                    <button id="backBtn" class="dark-btn btn-shipping">Cancel</button>
                    <button id="confirmBtn" class="dark-btn btn-available">Confirm Order</button>
                </div>
            </div>
        `);

        modal.open();

        document.getElementById("confirmBtn").addEventListener("click", function() {
            const enteredEmail = document.getElementById("emailInput").value;
            if (!enteredEmail || !enteredEmail.includes('@')) {
                alert("Please enter a valid email address");
                return;
            }

            const form = document.createElement("form");
            form.method = "POST";
            form.action = `/order_product/${productId}`;

            const csrf = document.createElement("input");
            csrf.type = "hidden";
            csrf.name = "_token";
            csrf.value = "63zOxwNthP2Ah5zXfvWdKn2mzUmHJfnIctF7R2vB";
            form.appendChild(csrf);

            const emailInput = document.createElement("input");
            emailInput.type = "hidden";
            emailInput.name = "custom_email";
            emailInput.value = enteredEmail;
            form.appendChild(emailInput);

            document.body.appendChild(form);
            form.submit();
        });

        document.getElementById("backBtn").addEventListener("click", function() {
            modal.close();
        });
    }
</script>
