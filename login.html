<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - SHADOWLOGS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-dark-5@1.1.3/dist/css/bootstrap-dark.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --square-size: 30px;
      --square-color: rgba(255, 255, 255, 0.05);
      --main-bg: #121212;
      --container-bg: rgba(32, 32, 32, 0.9);
      --accent-color: #28a745;
      --error-color: #dc3545;
    }
    body {
      min-height: 100vh;
      background-color: var(--main-bg);
      color: #ffffff;
      position: relative;
      overflow-x: hidden;
    }
    .squares-bg {
      position: fixed;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(90deg, var(--square-color) 1px, transparent 1px),
                  linear-gradient(180deg, var(--square-color) 1px, transparent 1px);
      background-size: var(--square-size) var(--square-size);
      z-index: 0;
      top: 0;
      left: 0;
    }
    .auth-container {
      background: var(--container-bg);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }
    .form-control {
      background-color: #2a2a2a !important;
      border: 1px solid #3a3a3a !important;
      color: #ffffff !important;
    }
    .form-control:focus {
      border-color: var(--accent-color) !important;
      box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
    }
    .auth-logo {
      width: 120px;
      height: 120px;
      border: 3px solid var(--accent-color);
      box-shadow: 0 0 20px rgba(40, 167, 69, 0.3);
    }
    .btn-primary {
      background: var(--accent-color);
      border: none;
      padding: 12px 0;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: #218838;
      transform: translateY(-2px);
    }
    .btn-primary:disabled {
      background: #6c757d;
      transform: none;
    }
    .btn-google {
      background-color: #db4437;
      color: white;
      font-weight: 600;
      border: none;
      padding: 10px 0;
      border-radius: 6px;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-google:hover {
      background-color: #c33d2e;
    }
    .btn-forgot {
      background: transparent;
      border: none;
      color: var(--accent-color);
      padding: 0;
      font-size: 0.9rem;
      text-decoration: underline;
      cursor: pointer;
    }
    .btn-forgot:hover {
      color: #218838;
    }
    .invalid-feedback {
      color: var(--error-color);
      font-weight: 500;
    }
    .text-accent {
      color: var(--accent-color) !important;
    }
    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .alert-danger {
      background-color: rgba(220, 53, 69, 0.2);
      border-color: var(--error-color);
      color: white;
    }
    .alert-success {
      background-color: rgba(40, 167, 69, 0.2);
      border-color: var(--accent-color);
      color: white;
    }
    .password-container {
      position: relative;
    }
    .password-container .btn-forgot {
      position: absolute;
      right: 0;
      top: 0;
      transform: translateY(-100%);
    }
    /* Modal styles */
    .modal-dark .modal-content {
      background-color: var(--container-bg);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .modal-dark .close {
      color: white;
    }
  </style>
</head>
<body>
  <div class="squares-bg"></div>
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-container p-5" style="width: 100%; max-width: 400px; position: relative; z-index: 1;">
      <div class="text-center mb-5">
        <img src="SHADOWLOGS.png" alt="Logo" class="auth-logo rounded-circle mb-4" />
        <h2 class="text-accent mb-1">SHADOWLOGS</h2>
        <p class="text-muted">Login to your account</p>
        <div id="loginAlert" class="alert d-none"></div>
      </div>
      <form id="loginForm" autocomplete="on" novalidate>
        <div class="mb-4">
          <label for="email" class="form-label">Email Address</label>
          <input id="email" type="email" class="form-control" name="email" required autocomplete="email" />
          <div class="invalid-feedback">Please enter your email address.</div>
        </div>
        <div class="mb-4 password-container">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="form-control" name="password" required autocomplete="current-password" />
          <button type="button" id="forgotPasswordBtn" class="btn-forgot">Forgot password?</button>
          <div class="invalid-feedback">Please enter your password.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
          <span id="loginText">Login</span>
          <span class="loading-spinner" id="spinner"></span>
        </button>
        <button type="button" id="googleLoginBtn" class="btn btn-google w-100 mb-3">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" style="width: 20px; height: 20px; margin-right: 10px;">
          Continue with Google
        </button>
        <div class="text-center mt-4">
          <p class="text-muted mb-0">Don't have an account?</p>
          <a href="index.html" class="text-accent text-decoration-none">Create account</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal fade modal-dark" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Reset Password</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <p>Enter your email address and we'll send you a link to reset your password.</p>
          <div class="form-group">
            <label for="resetEmail">Email Address</label>
            <input type="email" class="form-control" id="resetEmail" required>
            <div class="invalid-feedback" id="resetEmailFeedback"></div>
          </div>
          <div class="alert d-none" id="resetAlert"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="sendResetLinkBtn">
            <span id="resetText">Send Reset Link</span>
            <span class="loading-spinner" id="resetSpinner"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS and dependencies -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>

  <script type="module">
    // Import Firebase modules (Updated to v11.9.0)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      GoogleAuthProvider, 
      signInWithPopup,
      sendPasswordResetEmail,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";

    // Firebase configuration - Using ec4ca (has Auth enabled)
    const firebaseConfig = {
      apiKey: "AIzaSyBXC6A6NaL1WSHrfCNAuMeYZqx9DFZyToY",
      authDomain: "shadowlogsshop-ec4ca.firebaseapp.com",
      projectId: "shadowlogsshop-ec4ca",
      storageBucket: "shadowlogsshop-ec4ca.appspot.com",
      messagingSenderId: "709594271975",
      appId: "1:709594271975:web:6a4bfc8bdcbc51c2859242",
      measurementId: "G-WNEH2RQPVP"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    // Set persistence to LOCAL (persists across browser sessions)
    setPersistence(auth, browserLocalPersistence).catch((error) => {
      console.error('Persistence error:', error);
    });
    
    const provider = new GoogleAuthProvider();

    // DOM elements
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const loginText = document.getElementById('loginText');
    const spinner = document.getElementById('spinner');
    const googleLoginBtn = document.getElementById('googleLoginBtn');
    const loginAlert = document.getElementById('loginAlert');
    const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
    const forgotPasswordModal = new bootstrap.Modal(document.getElementById('forgotPasswordModal'));
    const resetEmail = document.getElementById('resetEmail');
    const resetEmailFeedback = document.getElementById('resetEmailFeedback');
    const sendResetLinkBtn = document.getElementById('sendResetLinkBtn');
    const resetText = document.getElementById('resetText');
    const resetSpinner = document.getElementById('resetSpinner');
    const resetAlert = document.getElementById('resetAlert');

    // Form validation
    function validateForm() {
      let isValid = true;
      
      if (!emailInput.value) {
        emailInput.classList.add('is-invalid');
        isValid = false;
      } else {
        emailInput.classList.remove('is-invalid');
      }
      
      if (!passwordInput.value) {
        passwordInput.classList.add('is-invalid');
        isValid = false;
      } else {
        passwordInput.classList.remove('is-invalid');
      }
      
      return isValid;
    }

    // Show loading state
    function showLoading(button, textElement, spinnerElement) {
      textElement.style.display = 'none';
      spinnerElement.style.display = 'inline-block';
      button.disabled = true;
    }

    // Hide loading state
    function hideLoading(button, textElement, spinnerElement) {
      textElement.style.display = 'inline';
      spinnerElement.style.display = 'none';
      button.disabled = false;
    }

    // Show alert message
    function showAlert(alertElement, message, type = 'danger') {
      alertElement.className = `alert alert-${type}`;
      alertElement.textContent = message;
      alertElement.classList.remove('d-none');
      
      // Hide alert after 5 seconds
      setTimeout(() => {
        alertElement.classList.add('d-none');
      }, 5000);
    }

    // Email/password login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!validateForm()) return;
      
      try {
        showLoading(loginBtn, loginText, spinner);
        
        const userCredential = await signInWithEmailAndPassword(
          auth,
          emailInput.value,
          passwordInput.value
        );
        
        console.log('✅ Firebase Auth Login Success!');
        console.log('👤 User:', userCredential.user.email);
        console.log('🆔 UID:', userCredential.user.uid);
        console.log('🔑 Current User:', auth.currentUser);
        
        // Successful login - redirect to home.html (UPDATED)
        setTimeout(() => {
          window.location.href = 'home.html';
        }, 1000); // Small delay to ensure auth persists
      } catch (error) {
        hideLoading(loginBtn, loginText, spinner);
        
        console.error('❌ Firebase Auth Login Failed!');
        console.error('Error code:', error.code);
        console.error('Error message:', error.message);
        
        let errorMessage = 'Login failed. Please try again.';
        
        switch (error.code) {
          case 'auth/user-not-found':
            errorMessage = 'No user found with this email address.';
            break;
          case 'auth/wrong-password':
            errorMessage = 'Incorrect password. Please try again.';
            break;
          case 'auth/invalid-email':
            errorMessage = 'Please enter a valid email address.';
            break;
          case 'auth/user-disabled':
            errorMessage = 'This account has been disabled.';
            break;
          case 'auth/too-many-requests':
            errorMessage = 'Too many failed attempts. Please try again later.';
            break;
        }
        
        showAlert(loginAlert, errorMessage);
      }
    });

    // Google login
    googleLoginBtn.addEventListener('click', async () => {
      try {
        showLoading(googleLoginBtn, googleLoginBtn.querySelector('span'), spinner);
        
        const result = await signInWithPopup(auth, provider);
        
        // Successful login - redirect to home.html (UPDATED)
        window.location.href = 'home.html';
      } catch (error) {
        hideLoading(googleLoginBtn, googleLoginBtn.querySelector('span'), spinner);
        let errorMessage = 'Google login failed. Please try again.';
        
        if (error.code === 'auth/popup-closed-by-user') {
          errorMessage = 'Google login popup was closed. Please try again.';
        }
        
        showAlert(loginAlert, errorMessage);
      }
    });

    // Forgot password button click
    forgotPasswordBtn.addEventListener('click', () => {
      resetEmail.value = emailInput.value; // Pre-fill with email from login form if available
      forgotPasswordModal.show();
    });

    // Send password reset email
    sendResetLinkBtn.addEventListener('click', async () => {
      const email = resetEmail.value.trim();
      
      if (!email) {
        resetEmail.classList.add('is-invalid');
        resetEmailFeedback.textContent = 'Please enter your email address.';
        return;
      }
      
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        resetEmail.classList.add('is-invalid');
        resetEmailFeedback.textContent = 'Please enter a valid email address.';
        return;
      }
      
      resetEmail.classList.remove('is-invalid');
      
      try {
        showLoading(sendResetLinkBtn, resetText, resetSpinner);
        
        await sendPasswordResetEmail(auth, email);
        
        showAlert(resetAlert, 'Password reset email sent. Please check your inbox.', 'success');
        setTimeout(() => {
          forgotPasswordModal.hide();
        }, 3000);
      } catch (error) {
        hideLoading(sendResetLinkBtn, resetText, resetSpinner);
        let errorMessage = 'Failed to send reset email. Please try again.';
        
        switch (error.code) {
          case 'auth/user-not-found':
            errorMessage = 'No user found with this email address.';
            break;
          case 'auth/invalid-email':
            errorMessage = 'Please enter a valid email address.';
            break;
          case 'auth/too-many-requests':
            errorMessage = 'Too many attempts. Please try again later.';
            break;
        }
        
        showAlert(resetAlert, errorMessage);
      }
    });

    // Auth state observer
    auth.onAuthStateChanged((user) => {
      if (user) {
        // User is signed in (this is useful if you want to redirect already logged-in users)
        // window.location.href = 'home.html';
      }
    });

    // Reset modal when closed
    document.getElementById('forgotPasswordModal').addEventListener('hidden.bs.modal', () => {
      resetAlert.classList.add('d-none');
      resetEmail.classList.remove('is-invalid');
    });
  </script>
</body>
</html>
