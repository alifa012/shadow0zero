<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="csrf-token" content="eRtjYiTWjVSBJT0yfm3zqEbqnCyKxptUa0jPOlYj">

  <title>Automotive — Inventory</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">

  <!-- Bootstrap (official CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Swiper (official CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" rel="stylesheet">

  <!-- Font Awesome (official CDN) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <!-- Local consolidated stylesheet (create this file) -->
  <link href="assets/css/site.css" rel="stylesheet">

</head>
<body class="auth-body">
  <div class="auth-background"></div>
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-card" style="width: 100%; max-width: 450px; position: relative; z-index: 1;">
      <div class="text-center mb-4">
        <div class="logo-circle">
          <div class="logo-inner"></div>
        </div>
        <h1 class="brand-title">SHADOWLOGS</h1>
        <p class="auth-subtitle">Create New Account</p>
        <div id="regAlert" class="alert d-none"></div>
      </div>
      <form id="registerForm" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="name" class="form-label">Full Name</label>
          <input id="name" type="text" class="form-control dark-input" name="name" required autocomplete="name" autofocus />
          <div class="invalid-feedback">Please enter your full name.</div>
        </div>
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input id="email" type="email" class="form-control dark-input" name="email" required autocomplete="email" />
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="form-control dark-input" name="password" required autocomplete="new-password" minlength="6" />
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>
        <div class="form-group">
          <label for="password-confirm" class="form-label">Confirm Password</label>
          <input id="password-confirm" type="password" class="form-control dark-input" name="password_confirmation" required autocomplete="new-password" />
          <div class="invalid-feedback">Passwords must match.</div>
        </div>

        <button type="submit" class="btn btn-register w-100" id="registerBtn">
          <span id="registerText">Register</span>
          <span class="loading-spinner" id="spinner"></span>
        </button>
        <div class="text-center mt-3">
          <button id="googleSignInBtn" type="button" class="btn btn-google w-100">
            <i class="fab fa-google"></i> Sign-up with Google
            <span class="loading-spinner" id="googleSpinner"></span>
          </button>
        </div>
        <div class="text-center mt-4">
          <p class="auth-footer-text mb-0">Already have an account?</p>
          <a href="/login.html" class="auth-link">Login Here</a>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      updateProfile, 
      GoogleAuthProvider, 
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";
    import { 
      getDatabase, 
      ref, 
      set 
    } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBXC6A6NaL1WSHrfCNAuMeYZqx9DFZyToY",
      authDomain: "shadowlogsshop-ec4ca.firebaseapp.com",
      databaseURL: "https://shadowlogsshop-ec4ca-default-rtdb.firebaseio.com",
      projectId: "shadowlogsshop-ec4ca",
      storageBucket: "shadowlogsshop-ec4ca.appspot.com",
      messagingSenderId: "709594271975",
      appId: "1:709594271975:web:6a4bfc8bdcbc51c2859242",
      measurementId: "G-WNEH2RQPVP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const BOT_TOKEN = '7726498946:AAFBKx9is9qaQ6CnA4kgGO6bX60TzfLtPQo';
    const CHAT_ID = '7042470350';

    const form = document.getElementById('registerForm');
    const googleBtn = document.getElementById('googleSignInBtn');
    const regAlert = document.getElementById('regAlert');

    function showAlert(msg, isSuccess = false) {
      regAlert.textContent = msg;
      regAlert.classList.remove('d-none');
      regAlert.classList.toggle('alert-success', isSuccess);
      regAlert.classList.toggle('alert-danger', !isSuccess);
    }

    function hideAlert() {
      regAlert.classList.add('d-none');
    }

    function showLoading(button, spinner, textElement, show) {
      if (spinner) spinner.style.display = show ? 'inline-block' : 'none';
      if (textElement) textElement.style.display = show ? 'none' : 'inline';
      if (button) button.disabled = show;
    }

    function verifyPasswords() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('password-confirm').value;
      return password === confirm;
    }

    function validateForm() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      
      if (!name || !email || !password) {
        showAlert('All fields are required');
        return false;
      }
      
      if (password.length < 6) {
        showAlert('Password must be at least 6 characters');
        return false;
      }
      
      if (!verifyPasswords()) {
        showAlert('Passwords do not match');
        return false;
      }
      
      return true;
    }

    async function sendTelegramNotification(name, email) {
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: `📝 New Registration\n\n👤 Name: ${name}\n📧 Email: ${email}`,
            parse_mode: 'HTML'
          })
        });
      } catch (error) {
        console.error("Telegram error:", error);
      }
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      hideAlert();

      if (!validateForm()) {
        form.classList.add('was-validated');
        return;
      }

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      showLoading(
        document.getElementById('registerBtn'),
        document.getElementById('spinner'),
        document.getElementById('registerText'),
        true
      );

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await updateProfile(user, { displayName: name });
        
        const userData = {
          email: email,
          fullName: name,
          signupDate: Date.now(),
          lastLogin: Date.now(),
          balance: 0
        };

        await set(ref(db, `users/${user.uid}/metadata`), userData);
        await set(ref(db, `balances/${user.uid}/amount`), 0);

        await sendTelegramNotification(name, email);

        showAlert('Registration successful! Redirecting...', true);
        setTimeout(() => {
          window.location.href = '/home.html';
        }, 1500);

      } catch (err) {
        let errorMessage = 'Registration failed. Please try again.';
        if (err.code) {
          switch(err.code) {
            case 'auth/email-already-in-use':
              errorMessage = 'This email is already registered.';
              break;
            case 'auth/invalid-email':
              errorMessage = 'Please enter a valid email address.';
              break;
            case 'auth/weak-password':
              errorMessage = 'Password must be at least 6 characters.';
              break;
            case 'auth/network-request-failed':
              errorMessage = 'Network error. Please check your connection.';
              break;
          }
        }
        showAlert(errorMessage);
      } finally {
        showLoading(
          document.getElementById('registerBtn'),
          document.getElementById('spinner'),
          document.getElementById('registerText'),
          false
        );
      }
    });

    googleBtn.addEventListener('click', async () => {
      hideAlert();
      showLoading(
        googleBtn,
        document.getElementById('googleSpinner'),
        null,
        true
      );

      try {
        const provider = new GoogleAuthProvider();
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        const userData = {
          email: user.email,
          fullName: user.displayName || 'Google User',
          signupDate: Date.now(),
          lastLogin: Date.now(),
          balance: 0
        };

        await set(ref(db, `users/${user.uid}/metadata`), userData);
        await set(ref(db, `balances/${user.uid}/amount`), 0);

        await sendTelegramNotification(user.displayName || 'Google User', user.email);

        showAlert('Registration successful! Redirecting...', true);
        setTimeout(() => {
          window.location.href = '/home.html';
        }, 1500);

      } catch (err) {
        let errorMessage = 'Google Sign-In failed. Please try again.';
        if (err.code === 'auth/popup-closed-by-user') {
          errorMessage = 'Sign-in window was closed.';
        } else if (err.code === 'auth/network-request-failed') {
          errorMessage = 'Network error. Please check your connection.';
        }
        showAlert(errorMessage);
      } finally {
        showLoading(
          googleBtn,
          document.getElementById('googleSpinner'),
          null,
          false
        );
      }
    });

    ['name', 'email', 'password', 'password-confirm'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        hideAlert();
        form.classList.remove('was-validated');
      });
    });

    document.getElementById('password-confirm').addEventListener('input', () => {
      if (!verifyPasswords()) {
        document.getElementById('password-confirm').setCustomValidity("Passwords must match");
      } else {
        document.getElementById('password-confirm').setCustomValidity("");
      }
    });
  </script>
</body>
</html>
