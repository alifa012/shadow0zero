<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Chat — Shadowlogs</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    #admin-container {
      display: flex;
      height: 100vh;
    }

    #conversations-sidebar {
      width: 300px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
    }

    #sidebar-header {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #sidebar-header h5 {
      margin: 0;
      font-weight: 600;
    }

    #conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .conversation-item {
      background: #2a2a2a;
      padding: 1rem;
      margin-bottom: 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .conversation-item:hover {
      background: #333;
    }

    .conversation-item.active {
      border-color: #28a745;
      background: #333;
    }

    .conversation-item .user-email {
      font-weight: 600;
      color: #28a745;
      margin-bottom: 0.25rem;
    }

    .conversation-item .last-message {
      font-size: 0.85rem;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-item .time {
      font-size: 0.75rem;
      opacity: 0.5;
      margin-top: 0.25rem;
    }

    .badge-unread {
      background: #dc3545;
      color: white;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      font-size: 0.75rem;
      float: right;
    }

    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
    }

    #chat-header {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
    }

    #messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      animation: fadeIn 0.3s;
    }

    .message.user {
      align-self: flex-start;
    }

    .message.admin {
      align-self: flex-end;
    }

    .message-bubble {
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      word-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .message.user .message-bubble {
      background: #2a2a2a;
      color: #fff;
      border-bottom-left-radius: 0.25rem;
    }

    .message.admin .message-bubble {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      color: #fff;
      border-bottom-right-radius: 0.25rem;
    }

    .message-time {
      font-size: 0.7rem;
      opacity: 0.5;
      margin-top: 0.25rem;
    }

    .message.user .message-time {
      text-align: left;
    }

    .message.admin .message-time {
      text-align: right;
    }

    .message-media img,
    .message-media video {
      max-width: 100%;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
    }

    #input-area {
      padding: 1rem;
      background: #1a1a1a;
      border-top: 1px solid #333;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      background: #2a2a2a;
      border: 2px solid #333;
      color: #fff;
      padding: 0.75rem;
      border-radius: 1.5rem;
      resize: none;
      max-height: 150px;
      font-family: 'Lato', sans-serif;
    }

    #message-input:focus {
      outline: none;
      border-color: #28a745;
    }

    #send-button {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      border: none;
      color: white;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #send-button:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 4px 15px rgba(40, 167, 69, 0.5);
    }

    #send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #back-button {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #back-button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      opacity: 0.5;
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .auth-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .auth-prompt button {
      background: #28a745;
      border: none;
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 1rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      #conversations-sidebar {
        width: 100%;
        position: absolute;
        z-index: 100;
        height: 100vh;
      }

      #conversations-sidebar.hidden {
        display: none;
      }

      #chat-area.hidden {
        display: none;
      }

      .message {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <div id="admin-container" style="display: none;">
    <!-- Conversations Sidebar -->
    <div id="conversations-sidebar">
      <div id="sidebar-header">
        <h5><i class="fas fa-comments"></i> Conversations</h5>
        <button id="back-button" onclick="window.location.href='/home.html'">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div id="conversations-list">
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>No conversations yet</p>
        </div>
      </div>
    </div>

    <!-- Notification Sound -->
    <audio id="notification-sound" preload="auto">
      <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBjem3O2bTBELTqLl7q1aFwxFnOH0xHMoBSp3yO/rkz4KEVK06fa0aiAFL1K76fW0aB8FKmO8/tiFNw" type="audio/wav">
    </audio>

    <!-- Chat Area -->
    <div id="chat-area">
      <div id="chat-header" style="display: none;">
        <button id="toggle-sidebar" style="background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: none;">
          <i class="fas fa-bars"></i>
        </button>
        <div id="header-title">
          <i class="fas fa-user"></i> <span id="current-user-email">Select a conversation</span>
        </div>
        <button onclick="window.location.reload()" style="background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;">
          <i class="fas fa-sync"></i>
        </button>
      </div>

      <div id="messages-container">
        <div class="empty-state">
          <i class="fas fa-comment-dots"></i>
          <p>Select a conversation to start chatting</p>
        </div>
      </div>

      <div id="input-area" style="display: none;">
        <textarea id="message-input" placeholder="Type your reply..." rows="1"></textarea>
        <button id="send-button" disabled>
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <div id="auth-prompt" class="auth-prompt">
    <i class="fas fa-lock fa-3x" style="color: #28a745; margin-bottom: 1rem;"></i>
    <h3>Admin Access Required</h3>
    <p style="opacity: 0.7; margin: 1rem 0;">Please log in with an admin account</p>
    <button onclick="window.location.href='/admin-login.html'">
      <i class="fas fa-sign-in-alt"></i> Go to Admin Login
    </button>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, serverTimestamp, where, getDocs } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBXC6A6NaL1WSHrfCNAuMeYZqx9DFZyToY",
      authDomain: "shadowlogsshop-ec4ca.firebaseapp.com",
      projectId: "shadowlogsshop-ec4ca",
      storageBucket: "shadowlogsshop-ec4ca.appspot.com",
      messagingSenderId: "709594271975",
      appId: "1:709594271975:web:6a4bfc8bdcbc51c2859242",
      measurementId: "G-WNEH2RQPVP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentAdmin = null;
    let currentConversationId = null;
    let unsubscribeMessages = null;
    let conversations = [];

    const adminContainer = document.getElementById('admin-container');
    const authPrompt = document.getElementById('auth-prompt');
    const conversationsList = document.getElementById('conversations-list');
    const messagesContainer = document.getElementById('messages-container');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');
    const inputArea = document.getElementById('input-area');
    const chatHeader = document.getElementById('chat-header');
    const currentUserEmail = document.getElementById('current-user-email');
    const notificationSound = document.getElementById('notification-sound');

    // Notification tracking
    const conversationMessageCounts = new Map(); // Track message count per conversation
    const conversationUnreadCounts = new Map(); // Track unread count per conversation

    // Play notification sound
    function playNotification() {
      try {
        notificationSound.currentTime = 0;
        notificationSound.play().catch(err => console.log('Sound play failed:', err));
        
        // Browser notification
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification('New Customer Message', {
            body: 'A customer has sent you a new message',
            icon: '/favicon.ico'
          });
        }
      } catch (e) {
        console.log('Notification sound error:', e);
      }
    }

    // Request notification permission on load
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    // Auto-resize textarea
    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      sendButton.disabled = !this.value.trim();
    });

    // Send message
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !currentConversationId) return;
      
      sendButton.disabled = true;
      
      try {
        await addDoc(collection(db, 'messages'), {
          conversationId: currentConversationId,
          senderType: 'admin',
          senderId: currentAdmin.uid,
          messageType: 'text',
          content: text,
          timestamp: Date.now(),
          createdAt: serverTimestamp()
        });
        
        messageInput.value = '';
        messageInput.style.height = 'auto';
      } catch (error) {
        console.error('Error sending message:', error);
        alert('Failed to send message: ' + error.message);
      } finally {
        sendButton.disabled = false;
      }
    }

    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Load conversations
    function loadConversations() {
      console.log('📚 Loading conversations...');
      
      // Try with orderBy first, but have fallback
      const q = query(
        collection(db, 'conversations')
        // Removed orderBy to avoid index requirement - will sort client-side
      );
      
      onSnapshot(q, (snapshot) => {
        console.log('✅ Conversations snapshot received. Count:', snapshot.size);
        conversations = [];
        conversationsList.innerHTML = '';
        
        if (snapshot.empty) {
          console.log('⚠️ No conversations found in Firestore');
          conversationsList.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-inbox"></i>
              <p>No conversations yet</p>
            </div>
          `;
          return;
        }
        
        snapshot.forEach((doc) => {
          const conv = { id: doc.id, ...doc.data() };
          console.log('💬 Found conversation:', conv.id, conv.userEmail);
          conversations.push(conv);
        });
        
        // Sort conversations by lastMessageAt (client-side)
        conversations.sort((a, b) => {
          const timeA = a.lastMessageAt ? (a.lastMessageAt.toMillis ? a.lastMessageAt.toMillis() : a.lastMessageAt) : 0;
          const timeB = b.lastMessageAt ? (b.lastMessageAt.toMillis ? b.lastMessageAt.toMillis() : b.lastMessageAt) : 0;
          return timeB - timeA; // Newest first
        });
        
        console.log('📋 Sorted conversations:', conversations.length);
        
        // Render conversations
        conversations.forEach(conv => {
          const item = document.createElement('div');
          item.className = 'conversation-item';
          item.dataset.convId = conv.id; // Add data attribute for identification
          if (currentConversationId === conv.id) {
            item.classList.add('active');
          }
          
          let timeDisplay = 'Just now';
          if (conv.lastMessageAt) {
            try {
              const date = conv.lastMessageAt.toDate ? conv.lastMessageAt.toDate() : new Date(conv.lastMessageAt);
              timeDisplay = date.toLocaleString();
            } catch (e) {
              console.error('Error formatting date:', e);
            }
          }
          
          item.innerHTML = `
            <div class="user-email">${conv.userEmail || 'Anonymous'}</div>
            <div class="time">${timeDisplay}</div>
          `;
          
          // Add unread badge if there are unread messages
          const unreadCount = conversationUnreadCounts.get(conv.id) || 0;
          if (unreadCount > 0) {
            const badge = document.createElement('span');
            badge.className = 'unread-badge';
            badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
            item.appendChild(badge);
          }
          
          item.addEventListener('click', () => {
            console.log('👆 Clicked conversation:', conv.id);
            
            // Clear unread count for this conversation
            conversationUnreadCounts.set(conv.id, 0);
            const badge = item.querySelector('.unread-badge');
            if (badge) badge.remove();
            
            loadMessages(conv.id, conv.userEmail);
            
            // Update active state
            document.querySelectorAll('.conversation-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            
            // Mobile: hide sidebar when conversation is selected
            if (window.innerWidth <= 768) {
              document.getElementById('conversations-sidebar').classList.add('hidden');
              document.getElementById('chat-area').classList.remove('hidden');
            }
          });
          
          conversationsList.appendChild(item);
        });
        
        // Set up global message listener to detect new customer messages
        setupGlobalMessageListener();
      }, (error) => {
        console.error('❌ Error loading conversations:', error);
        console.error('Error code:', error.code);
        console.error('Error message:', error.message);
        conversationsList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Error loading conversations: ${error.message}</p>
          </div>
        `;
      });
    }

    // Global message listener to detect new messages from customers
    function setupGlobalMessageListener() {
      const q = query(collection(db, 'messages'));
      
      onSnapshot(q, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          if (change.type === 'added') {
            const msg = change.doc.data();
            
            // Only notify for user messages (not admin)
            if (msg.senderType === 'user') {
              const convId = msg.conversationId;
              
              // Initialize count if first time seeing this conversation
              if (!conversationMessageCounts.has(convId)) {
                conversationMessageCounts.set(convId, 0);
                conversationUnreadCounts.set(convId, 0);
                return; // Don't notify on initial load
              }
              
              // New message detected
              const currentCount = conversationMessageCounts.get(convId) || 0;
              conversationMessageCounts.set(convId, currentCount + 1);
              
              // If not viewing this conversation, mark as unread
              if (convId !== currentConversationId) {
                const unreadCount = (conversationUnreadCounts.get(convId) || 0) + 1;
                conversationUnreadCounts.set(convId, unreadCount);
                
                // Update conversation item with badge
                const convItems = document.querySelectorAll('.conversation-item');
                convItems.forEach(item => {
                  if (item.dataset.convId === convId) {
                    let badge = item.querySelector('.unread-badge');
                    if (!badge) {
                      badge = document.createElement('span');
                      badge.className = 'unread-badge';
                      item.appendChild(badge);
                    }
                    badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                  }
                });
                
                // Play notification
                console.log('🔔 New customer message! Conversation:', convId);
                playNotification();
              }
            }
          }
        });
      });
    }

    // Load messages
    function loadMessages(conversationId, userEmail) {
      console.log('📨 Loading messages for conversation:', conversationId, userEmail);
      currentConversationId = conversationId;
      currentUserEmail.textContent = userEmail || 'User';
      
      // Unsubscribe from previous conversation
      if (unsubscribeMessages) {
        unsubscribeMessages();
      }
      
      const q = query(
        collection(db, 'messages'),
        where('conversationId', '==', conversationId)
        // Removed orderBy to avoid index requirement - will sort client-side
      );
      
      unsubscribeMessages = onSnapshot(q, (snapshot) => {
        console.log('✅ Messages snapshot received. Count:', snapshot.size);
        messagesContainer.innerHTML = '';
        
        // Collect and sort messages
        const messages = [];
        snapshot.forEach((doc) => {
          messages.push(doc.data());
        });
        
        // Sort by timestamp (oldest first)
        messages.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        
        // Render sorted messages
        messages.forEach((message) => {
          console.log('💬 Message:', message.senderType, message.content?.substring(0, 50));
          const messageElement = createMessageElement(message);
          messagesContainer.appendChild(messageElement);
        });
        
        // Scroll to bottom
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }, (error) => {
        console.error('❌ Error loading messages:', error);
        console.error('Error code:', error.code);
        console.error('Error message:', error.message);
        messagesContainer.innerHTML = `
          <div style="text-align: center; padding: 2rem; color: #ff6b6b;">
            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <p>Error loading messages: ${error.message}</p>
          </div>
        `;
      });
      
      // Show input area and header
      inputArea.style.display = 'flex';
      chatHeader.style.display = 'flex';
    }

    function createMessageElement(message) {
      const div = document.createElement('div');
      div.className = `message ${message.senderType}`;
      
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      
      // Add media if present
      if (message.messageType === 'image') {
        const media = document.createElement('div');
        media.className = 'message-media';
        const img = document.createElement('img');
        img.src = message.content;
        img.alt = 'Image';
        img.loading = 'lazy';
        media.appendChild(img);
        bubble.appendChild(media);
      } else if (message.messageType === 'video') {
        const media = document.createElement('div');
        media.className = 'message-media';
        const video = document.createElement('video');
        video.src = message.content;
        video.controls = true;
        media.appendChild(video);
        bubble.appendChild(media);
      } else {
        bubble.textContent = message.content;
      }
      
      div.appendChild(bubble);
      
      const time = document.createElement('div');
      time.className = 'message-time';
      time.textContent = new Date(message.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      div.appendChild(time);
      
      return div;
    }

    // Mobile sidebar toggle
    document.getElementById('toggle-sidebar').addEventListener('click', () => {
      document.getElementById('conversations-sidebar').classList.toggle('hidden');
    });

    // Check admin authentication via localStorage (matches admin-login.html)
    function checkAdminAuth() {
      const isAdminLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
      const adminEmail = localStorage.getItem('adminEmail');
      
      if (isAdminLoggedIn && adminEmail) {
        // Create mock admin user object for compatibility
        currentAdmin = {
          uid: 'admin',
          email: adminEmail
        };
        
        adminContainer.style.display = 'flex';
        authPrompt.style.display = 'none';
        
        loadConversations();
      } else {
        // Not logged in as admin - redirect to login
        adminContainer.style.display = 'none';
        authPrompt.style.display = 'flex';
      }
    }
    
    // Run auth check on page load
    checkAdminAuth();

    // Show sidebar toggle on mobile
    if (window.innerWidth <= 768) {
      document.getElementById('toggle-sidebar').style.display = 'flex';
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
